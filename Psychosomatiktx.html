<script>
(()=>{"use strict";
const DATA=JSON.parse(document.getElementById("mindmap-data").textContent);
const KEY="psychosomatik-mindmap-theme";
const $=id=>document.getElementById(id);
const badge=$("badge"),msg=$("msg"),section=$("section"),full=$("full"),overview=$("overview"),focus=$("focus"),theme=$("theme");
let mm,toolbarTheme;

const clone=o=>JSON.parse(JSON.stringify(o));
const count=n=>1+(n.children||[]).reduce((s,c)=>s+count(c),0);

const pref=()=>{
  const saved=localStorage.getItem(KEY);
  return saved==="light"||saved==="dark" ? saved : "dark";
};

const apply=(t,save=true)=>{
  t=t==="dark" ? "dark" : "light";
  document.documentElement.dataset.theme=t;
  document.documentElement.classList.toggle("markmap-dark",t==="dark");
  if(save) localStorage.setItem(KEY,t);

  theme.textContent=t==="dark" ? "☀ Hell" : "☾ Dunkel";
  theme.setAttribute("aria-label",t==="dark" ? "Zum hellen Modus wechseln" : "Zum dunklen Modus wechseln");

  if(toolbarTheme){
    toolbarTheme.textContent=t==="dark" ? "☀" : "☾";
    toolbarTheme.title=t==="dark" ? "Hellen Modus aktivieren" : "Dunklen Modus aktivieren";
    toolbarTheme.setAttribute("aria-label",toolbarTheme.title);
  }
};

const toggle=()=>apply(document.documentElement.dataset.theme==="dark" ? "light" : "dark");

const setActive=view=>{
  full.classList.toggle("active",view==="full");
  overview.classList.toggle("active",view==="overview");
  focus.classList.toggle("active",view==="focus");
};

const setBadge=text=>badge.querySelector("span:last-child").textContent=text;

const fit=(delay=80)=>setTimeout(()=>{
  try{ if(mm&&mm.fit) mm.fit(); }
  catch(e){ console.warn("Fit failed",e); }
},delay);

const show=text=>{
  msg.textContent=text;
  msg.classList.add("on");
  clearTimeout(show.timer);
  show.timer=setTimeout(()=>msg.classList.remove("on"),3800);
};

const setMap=(data,label,view)=>{
  if(!mm) return;
  mm.setData(clone(data));
  setActive(view);
  setBadge(label);
  fit();
};

const overviewData=()=>{
  const root=clone(DATA);
  root.children=root.children.map(section=>({
    content:section.content,
    children:[],
    payload:section.payload||{}
  }));
  return root;
};

const focusData=index=>{
  const root=clone(DATA);
  root.children=[clone(DATA.children[index])];
  return root;
};

DATA.children.forEach((item,index)=>{
  const option=document.createElement("option");
  option.value=String(index);
  option.textContent=item.content;
  section.append(option);
});

function makeToolbar(){
  if(!window.markmap||!window.markmap.Toolbar||!mm) return;

  const toolbar=new window.markmap.Toolbar();
  toolbar.attach(mm);
  const el=toolbar.render();

  el.classList.add("study-toolbar");
  el.style.position="absolute";
  el.style.bottom="20px";
  el.style.right="20px";

  el.querySelectorAll("a").forEach(a=>{
    const href=(a.getAttribute("href")||"").toLowerCase();
    const label=`${a.textContent||""} ${a.title||""} ${a.getAttribute("aria-label")||""}`.toLowerCase();
    if(href.includes("markmap")||label.includes("markmap")){
      a.removeAttribute("href");
      a.removeAttribute("target");
      a.removeAttribute("rel");
      a.setAttribute("aria-hidden","true");
      a.setAttribute("tabindex","-1");
      a.style.display="none";
      a.style.pointerEvents="none";
    }
  });

  const brand=document.createElement("span");
  brand.className="toolbar-brand";
  brand.textContent="Therapie";
  brand.title="Lokale Lern-Mindmap – kein externer Link";
  el.prepend(brand);

  toolbarTheme=document.createElement("button");
  toolbarTheme.className="toolbar-theme";
  toolbarTheme.type="button";
  toolbarTheme.addEventListener("click",toggle);
  el.append(toolbarTheme);

  document.body.append(el);
  apply(document.documentElement.dataset.theme||pref(),false);
}

function init(){
  if(!window.markmap||!window.d3){
    show("Die Markmap-Bibliotheken konnten nicht geladen werden. Prüfe bitte Internetverbindung oder CDN-Zugriff.");
    return;
  }

  const {Markmap,deriveOptions}=window.markmap;
  const options=deriveOptions({
    autoFit:true,
    colorFreezeLevel:2,
    duration:420,
    initialExpandLevel:-1,
    maxWidth:360,
    spacingHorizontal:92,
    spacingVertical:11
  });

  mm=Markmap.create("svg#mindmap",options,clone(DATA));
  window.mm=mm;
  window.psychosomatikMindmapData=DATA;
  window.therapieMindmapData=DATA;

  makeToolbar();
  fit(180);
  setBadge(`Vollansicht · ${DATA.children.length} Hauptbereiche · ${count(DATA)} Begriffe/Knoten`);
}

full.addEventListener("click",()=>{
  setMap(DATA,`Vollansicht · ${DATA.children.length} Hauptbereiche · ${count(DATA)} Begriffe/Knoten`,"full");
});

overview.addEventListener("click",()=>{
  setMap(overviewData(),"Überblick · nur Hauptbereiche sichtbar · Vollansicht stellt alle Details wieder her","overview");
});

focus.addEventListener("click",()=>{
  const index=Number(section.value||0);
  const label=DATA.children[index]?.content||"ausgewählter Bereich";
  setMap(focusData(index),`Fokusansicht · ${label} · Vollansicht stellt die Gesamtmap wieder her`,"focus");
});

theme.addEventListener("click",toggle);
window.addEventListener("resize",()=>fit(160));

apply(pref(),false);
init();
})();
</script>
</body>
</html>
